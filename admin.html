<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Admin — esp1.org</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#070707">
  <link rel="stylesheet" href="/src/style.css" />
  <link rel="stylesheet" href="/src/admin.css" />
  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <!-- SortableJS for gallery drag-and-drop -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <!-- Cropper.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
</head>
<body>
  <div id="adminApp">

    <!-- LOGIN -->
    <div id="loginScreen" class="login-screen">
      <div class="login-box">
        <div class="login-logo">ESP<em>1</em>.ORG</div>
        <div class="login-sub">Admin</div>
        <form id="loginForm" autocomplete="on">
          <input type="email"    name="username" id="loginEmail"    autocomplete="username"         placeholder="E-post" required>
          <input type="password" name="password" id="loginPassword" autocomplete="current-password" placeholder="Passord" required>
          <button type="submit" class="login-btn">Logg inn</button>
        </form>
        <div id="loginError" class="login-error"></div>
      </div>
    </div>

    <!-- ADMIN PANEL (hidden until logged in) -->
    <div id="adminPanel" style="display:none">

      <nav class="admin-nav">
        <a href="/" class="logo">ESP<em>1</em>.ORG</a>
        <div class="admin-nav-center">
          <button class="admin-tab active" data-tab="articles">Artikler</button>
          <button class="admin-tab" data-tab="new">+ Ny artikkel</button>
        </div>
        <div class="admin-nav-right">
          <span id="adminEmail" class="admin-user"></span>
          <button id="logoutBtn" class="admin-logout">Logg ut</button>
        </div>
      </nav>

      <!-- ARTICLE LIST -->
      <div id="tabArticles" class="admin-tab-content">
        <div class="admin-toolbar">
          <input type="search" id="searchInput" placeholder="Søk i artikler…" class="admin-search">
          <select id="filterCat" class="admin-filter">
            <option value="">Alle kategorier</option>
            <option value="skyting">Skyting</option>
            <option value="militær">Militær</option>
            <option value="ledelse">Ledelse</option>
            <option value="refleksjon">Refleksjon</option>
          </select>
        </div>
        <div id="articleList" class="article-list-admin">
          <div class="loading-full">Laster artikler…</div>
        </div>
      </div>

      <!-- NEW / EDIT ARTICLE -->
      <div id="tabNew" class="admin-tab-content" style="display:none">
        <div class="editor-wrap">
          <div class="editor-main">
            <input type="hidden" id="editId">
            <input type="text" id="editTitle" class="editor-title-input" placeholder="Artikkeltittel…">

            <div class="editor-meta-row">
              <select id="editCategory" class="editor-select">
                <option value="skyting">Skyting</option>
                <option value="reisebrev">Reisebrev</option>
                <option value="forsvaret">Forsvaret</option>
                <option value="ledelse">Ledelse</option>
                <option value="refleksjon">Refleksjon</option>
              </select>
              <input type="text" id="editTags" class="editor-input" placeholder="Tags (kommaseparert)">
              <input type="date" id="editDate" class="editor-input">
            </div>

            <!-- Toolbar -->
            <div class="editor-toolbar">
              <button type="button" data-cmd="bold"          class="tb-btn" title="Fet">B</button>
              <button type="button" data-cmd="italic"        class="tb-btn tb-i" title="Kursiv">I</button>
              <button type="button" data-cmd="h2"            class="tb-btn" title="Overskrift 2">H2</button>
              <button type="button" data-cmd="h3"            class="tb-btn" title="Overskrift 3">H3</button>
              <button type="button" data-cmd="quote"         class="tb-btn" title="Sitat">❝</button>
              <button type="button" data-cmd="link"          class="tb-btn" title="Lenke">🔗</button>
              <button type="button" data-cmd="insertImage"   class="tb-btn" title="Bilde-URL">📷</button>
              <div class="tb-sep"></div>
              <button type="button" id="previewToggle" class="tb-btn">Forhåndsvisning</button>
            </div>

            <div id="editorBody"    class="editor-body"    contenteditable="true" spellcheck="true"></div>
            <div id="previewBody"   class="editor-preview" style="display:none"></div>
          </div>

          <!-- ═══ SIDEBAR ═══ -->
          <div class="editor-sidebar">

            <!-- HERO IMAGE -->
            <div class="sidebar-section">
              <div class="sidebar-label">Hero-bilde</div>

              <!-- Drop zone -->
              <div id="heroDropZone" class="drop-zone" title="Dra bilde hit, lim inn, eller velg fil">
                <div class="drop-zone-icon">🖼</div>
                <div class="drop-zone-text">Dra &amp; slipp, lim inn<br><span>eller velg metode under</span></div>
              </div>

              <!-- Upload methods row -->
              <div class="upload-methods">
                <label class="upload-method-btn" title="Velg fil">
                  📁 Fil
                  <input type="file" id="heroImageFile" accept="image/*" class="hidden-input">
                </label>
                <label class="upload-method-btn" title="Ta bilde med kamera" id="heroCameraLabel">
                  📷 Kamera
                  <input type="file" id="heroImageCamera" accept="image/*" capture="environment" class="hidden-input">
                </label>
                <button type="button" class="upload-method-btn" id="heroUrlBtn" title="Lim inn URL">🔗 URL</button>
              </div>

              <!-- URL input (hidden by default) -->
              <input type="text" id="heroImageUrl" class="editor-input hero-url-input" placeholder="https://…" style="display:none">

              <!-- Upload progress -->
              <div id="heroProgress" class="upload-progress" style="display:none">
                <div class="upload-progress-bar" id="heroProgressBar"></div>
                <span id="heroProgressText">0%</span>
              </div>

              <!-- Preview + controls -->
              <div id="heroImagePreview" class="image-preview"></div>

              <!-- Hero position picker (shown after image) -->
              <div id="heroPositionWrap" class="hero-position-wrap" style="display:none">
                <div class="sidebar-label" style="margin-top:0.5rem">Bildeposisjon</div>
                <div class="position-grid" id="heroPositionGrid">
                  <button class="pos-btn" data-pos="top left">↖</button>
                  <button class="pos-btn" data-pos="top center">↑</button>
                  <button class="pos-btn" data-pos="top right">↗</button>
                  <button class="pos-btn" data-pos="center left">←</button>
                  <button class="pos-btn active" data-pos="center center">·</button>
                  <button class="pos-btn" data-pos="center right">→</button>
                  <button class="pos-btn" data-pos="bottom left">↙</button>
                  <button class="pos-btn" data-pos="bottom center">↓</button>
                  <button class="pos-btn" data-pos="bottom right">↘</button>
                </div>
                <button type="button" id="heroCropBtn" class="crop-trigger-btn">✂ Beskjær bilde</button>
              </div>
            </div>

            <!-- GALLERY -->
            <div class="sidebar-section">
              <div class="sidebar-label">Galleri</div>

              <!-- Gallery drop zone -->
              <div id="galleryDropZone" class="drop-zone drop-zone-sm" title="Dra bilder hit">
                <div class="drop-zone-icon">🗂</div>
                <div class="drop-zone-text">Dra bilder hit</div>
              </div>

              <div class="upload-methods">
                <label class="upload-method-btn" title="Velg filer">
                  📁 Filer
                  <input type="file" id="galleryFiles" accept="image/*" multiple class="hidden-input">
                </label>
                <label class="upload-method-btn" title="Ta bilder med kamera">
                  📷 Kamera
                  <input type="file" id="galleryCamera" accept="image/*" capture="environment" class="hidden-input">
                </label>
              </div>

              <!-- Gallery upload progress -->
              <div id="galleryProgress" class="upload-progress" style="display:none">
                <div class="upload-progress-bar" id="galleryProgressBar"></div>
                <span id="galleryProgressText">0 / 0</span>
              </div>

              <!-- Layout selector -->
              <div class="gallery-layout-selector" id="galleryLayoutSelector" style="display:none">
                <div class="sidebar-label" style="margin-top:0.25rem">Visning</div>
                <div class="layout-btns">
                  <button class="layout-btn active" data-layout="grid" title="Rutenett">⊞ Rutenett</button>
                  <button class="layout-btn" data-layout="masonry" title="Masonry">⧉ Masonry</button>
                  <button class="layout-btn" data-layout="carousel" title="Karusell">▷ Karusell</button>
                </div>
              </div>

              <!-- Gallery preview (sortable) -->
              <div id="galleryPreview" class="gallery-preview sortable-gallery"></div>
              <div id="galleryHint" class="gallery-hint" style="display:none">Dra for å endre rekkefølge · Klikk × for å fjerne</div>
            </div>

            <!-- PUBLISERING -->
            <div class="sidebar-section">
              <div class="sidebar-label">Publisering</div>
              <label class="toggle-label">
                <input type="checkbox" id="editPublished" class="toggle-input">
                <span class="toggle-track"></span>
                <span class="toggle-text">Publisert</span>
              </label>
            </div>

            <div class="sidebar-actions">
              <button id="saveBtn"   class="save-btn">Lagre</button>
              <button id="deleteBtn" class="delete-btn" style="display:none">Slett artikkel</button>
            </div>
            <div id="saveStatus" class="save-status"></div>
          </div><!-- /editor-sidebar -->
        </div>
      </div>

    </div>
  </div>

  <!-- ══ CROP MODAL ══ -->
  <div id="cropModal" class="crop-modal" style="display:none">
    <div class="crop-modal-inner">
      <div class="crop-modal-header">
        <span>Beskjær bilde</span>
        <div class="crop-modal-tools">
          <button type="button" class="crop-tool-btn" id="cropRotateLeft"  title="Roter venstre">↺</button>
          <button type="button" class="crop-tool-btn" id="cropRotateRight" title="Roter høyre">↻</button>
          <button type="button" class="crop-tool-btn" id="cropFlipH"       title="Speilvend">⇔</button>
          <select id="cropAspect" class="crop-aspect-select">
            <option value="free">Fri</option>
            <option value="16/9" selected>16:9</option>
            <option value="4/3">4:3</option>
            <option value="1/1">1:1</option>
            <option value="3/2">3:2</option>
          </select>
        </div>
      </div>
      <div class="crop-canvas-wrap">
        <img id="cropImage" alt="Crop">
      </div>
      <div class="crop-modal-footer">
        <div class="crop-quality-wrap">
          <label class="sidebar-label">Kvalitet</label>
          <input type="range" id="cropQuality" min="60" max="100" value="90" class="quality-slider">
          <span id="cropQualityVal">90%</span>
        </div>
        <div class="crop-footer-actions">
          <button type="button" id="cropCancel" class="crop-cancel-btn">Avbryt</button>
          <button type="button" id="cropApply"  class="crop-apply-btn">✓ Bruk</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ALT TEXT MODAL -->
  <div id="altModal" class="alt-modal" style="display:none">
    <div class="alt-modal-inner">
      <div class="alt-modal-title">Alt-tekst for bilde</div>
      <input type="text" id="altTextInput" class="editor-input" placeholder="Beskriv bildet for skjermlesere…">
      <div class="alt-modal-actions">
        <button type="button" id="altCancel" class="crop-cancel-btn">Avbryt</button>
        <button type="button" id="altSave"   class="crop-apply-btn">✓ Lagre</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
